<div class="d-flex justify-content-center">
    <p class="topic-heading">Property Binding</p>
</div>
<mat-divider></mat-divider>
<div class="d-flex justify-content-center mt-1">
    <img [src]="imgSource" [alt]="alternateName" [id]="imageId">
</div>
<div class="d-flex mt-2 flex-column align-items-center container">
    <div class="col-md-5">
        <mat-form-field appearance="outline">
            <mat-label>Enter password</mat-label>
            <input matInput [type]="showPassword">
        </mat-form-field>
        <button mat-flat-button (click)="hideAndShowPassword()">{{buttonName}}</button>
    </div>
</div>
<h3 [style.color]="isOnline ? 'green' : 'red'" class="text-center fw-bold">Sivaji</h3>
